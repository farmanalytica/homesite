name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # VITE_BASE controls the base path:
      #   unset/empty -> '/homesite/' (project page, github.io/homesite/)
      #   '/'         -> site root (custom domain farmanalytica.com.br)
      - run: npm run build
        env:
          VITE_BASE: ${{ vars.VITE_BASE }}

      # When deploying at the root, emit the CNAME so Pages serves the
      # custom domain. Set the repo variable VITE_BASE=/ to switch over.
      - name: Add CNAME for custom domain
        if: ${{ vars.VITE_BASE == '/' }}
        run: echo 'farmanalytica.com.br' > dist/CNAME

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
